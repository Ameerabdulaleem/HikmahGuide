<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#14273b"/>
      <stop offset="70%" stop-color="#0c1826"/>
      <stop offset="100%" stop-color="#0a1420"/>
    </radialGradient>
    <linearGradient id="star" x1="22%" y1="10%" x2="78%" y2="90%">
      <stop offset="0%" stop-color="#f4dc93"/>
      <stop offset="45%" stop-color="#e0b85f"/>
      <stop offset="100%" stop-color="#c69739"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#8ff7db"/>
      <stop offset="55%" stop-color="#17c9a2"/>
      <stop offset="100%" stop-color="#0d947a"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- rounded dark frame -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="16" fill="url(#bg)" stroke="#1c3247" stroke-width="1.5"/>

  <!-- faint outer ring -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="#e0b85f" stroke-opacity="0.35" stroke-width="1.2"/>

  <!-- 8-pointed compass star: 4 cardinal long points + 4 diagonal short points -->
  <g filter="url(#glow)">
    <path d="M32 7 L35.5 28.5 L57 32 L35.5 35.5 L32 57 L28.5 35.5 L7 32 L28.5 28.5 Z" fill="url(#star)"/>
    <path d="M32 14 L34 30 L50 32 L34 34 L32 50 L30 34 L14 32 L30 30 Z" fill="url(#star)" opacity="0.5" transform="rotate(45 32 32)"/>
  </g>

  <!-- glowing teal core -->
  <circle cx="32" cy="32" r="7.5" fill="url(#core)" filter="url(#glow)"/>
  <circle cx="32" cy="32" r="3.2" fill="#0a1420"/>
</svg>
